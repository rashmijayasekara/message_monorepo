services:
  php:
    build: .
    volumes:
      - message_data:/data
    environment:
      LOG_FILE: /data/message_log.txt

  nginx:
    image: nginx:alpine
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./public:/var/www/html/public:ro
      - ./api:/var/www/html/api:ro
    depends_on:
      - php

volumes:
  message_data:
